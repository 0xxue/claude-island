<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Dynamic Island</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../modules/pet/pixel-pets.css">
</head>
<body>

    <div id="dynamic-island" class="island-circle">
        <header class="island-header" id="drag-handle">
            <!-- Pixel Pet (circle state) -->
            <div class="circle-pet-wrap" id="circle-pet-wrap">
              <div class="pixel-pet octopus" id="circle-pixel-pet"><div class="sprite"></div></div>
              <div class="pet-zzz" id="circle-zzz">z<span>z</span><span>z</span></div>
            </div>

            <div class="island-content-collapsed">
                <div class="pill-pet-wrap" id="pill-pet-wrap">
                  <div class="pixel-pet octopus mini" id="pill-pixel-pet"><div class="sprite"></div></div>
                </div>
                <span class="pet-action-icon" id="pill-action"></span>
                <div class="agent-compact-status" id="compact-status">
                    All Systems Operational
                </div>
            </div>

            <div class="status-icon-group" id="status-icons">
                <button class="sound-toggle" id="sound-toggle" title="Toggle Sound">🔊</button>
                <button class="settings-btn" id="settings-btn" title="Settings">⚙</button>
            </div>

            <!-- Settings Popup (inside island) -->
            <div class="settings-popup" id="settings-popup" style="display:none;">
              <div class="popup-title">Settings</div>
              <div class="popup-section">
                <span class="popup-label">Pet</span>
                <div class="popup-pets">
                  <button class="pet-option active" data-pet="octopus"><div class="pixel-pet octopus mini"><div class="sprite"></div></div></button>
                  <button class="pet-option" data-pet="cat"><div class="pixel-pet cat mini"><div class="sprite"></div></div></button>
                  <button class="pet-option" data-pet="dragon"><div class="pixel-pet dragon mini"><div class="sprite"></div></div></button>
                  <button class="pet-option" data-pet="robot"><div class="pixel-pet robot mini"><div class="sprite"></div></div></button>
                  <button class="pet-option" data-pet="ghost"><div class="pixel-pet ghost mini"><div class="sprite"></div></div></button>
                  <button class="pet-option" data-pet="crab"><div class="pixel-pet crab mini"><div class="sprite"></div></div></button>
                </div>
              </div>
            </div>
        </header>

        <main class="island-expanded-content">
            <div class="exp-pet-bar">
              <div class="exp-pet-wrap" id="exp-pet-wrap">
                <div class="pixel-pet octopus" id="exp-pixel-pet"><div class="sprite"></div></div>
              </div>
              <span class="pet-action-icon" id="exp-action"></span>
              <div class="pet-speech" id="pet-speech">Ready to help!</div>
            </div>
            <div class="notification-feed" id="notification-feed"></div>
            <div class="island-footer">
                <span class="footer-stat" id="footer-stat">0 agents</span>
                <span class="footer-link">Show all sessions →</span>
            </div>
        </main>
    </div>

    <script src="../modules/pet/pet.js"></script>
    <script src="../modules/sound/sound.js"></script>
    <script src="script.js"></script>
</body>
</html>
