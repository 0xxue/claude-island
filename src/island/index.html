<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="island" class="island collapsed">
    <!-- Collapsed -->
    <div class="island-collapsed" id="collapsed-area">
      <div class="dot" id="dot"></div>
      <span class="label" id="label">Claude Code</span>
      <span class="status" id="status">就绪</span>
    </div>

    <!-- Expanded -->
    <div class="island-expanded">
      <div class="expanded-header" id="header-area">
        <div class="dot" id="dot2"></div>
        <span class="title">Claude Code</span>
        <span class="collapse-hint">▲ 收起</span>
      </div>
      <div class="expanded-body">
        <div class="icon" id="icon">⚡</div>
        <div class="detail" id="detail">正在处理...</div>
      </div>
      <div class="expanded-actions">
        <button class="btn-secondary" id="btn-dismiss">忽略</button>
        <button class="btn-primary" id="btn-focus">跳转到 Claude</button>
      </div>
    </div>
  </div>
<script src="app.js"></script>
</body>
</html>
