<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Island — Glass + Pixel Pet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../modules/pet/pixel-pets.css">
</head>
<body>

<!-- Settings Bar -->
<div class="pet-selector" id="pet-selector">
  <button class="sound-toggle" id="sound-toggle" title="Toggle Sound">🔊</button>
  <div class="divider"></div>
  <span class="selector-label">Pet:</span>
  <button class="pet-option active" data-pet="octopus" title="Octopus">
    <div class="pixel-pet octopus mini"><div class="sprite"></div></div>
  </button>
  <button class="pet-option" data-pet="cat" title="Cat">
    <div class="pixel-pet cat mini"><div class="sprite"></div></div>
  </button>
  <button class="pet-option" data-pet="dragon" title="Dragon">
    <div class="pixel-pet dragon mini"><div class="sprite"></div></div>
  </button>
  <button class="pet-option" data-pet="robot" title="Robot">
    <div class="pixel-pet robot mini"><div class="sprite"></div></div>
  </button>
  <button class="pet-option" data-pet="ghost" title="Ghost">
    <div class="pixel-pet ghost mini"><div class="sprite"></div></div>
  </button>
  <button class="pet-option" data-pet="crab" title="Crab">
    <div class="pixel-pet crab mini"><div class="sprite"></div></div>
  </button>
</div>

<div id="island" class="island island-circle">
  <!-- ═══ Circle: Pixel pet sleeping ═══ -->
  <div class="circle-content">
    <div class="circle-pet-wrap" id="circle-pet-wrap">
      <div class="pixel-pet octopus" id="circle-pixel-pet"><div class="sprite"></div></div>
    </div>
    <div class="pet-zzz" id="circle-zzz">z<span>z</span><span>z</span></div>
  </div>

  <!-- ═══ Pill: Pixel pet + status ═══ -->
  <header class="pill-content" id="drag-handle">
    <div class="pill-left">
      <div class="pill-pet-wrap" id="pill-pet-wrap">
        <div class="pixel-pet octopus mini" id="pill-pixel-pet"><div class="sprite"></div></div>
      </div>
      <span class="pet-action-icon" id="pill-pet-action"></span>
      <span class="pill-text" id="pill-text">All Systems Operational</span>
    </div>
    <div class="pill-right">
      <div class="pill-wave" id="pill-wave">
        <span></span><span></span><span></span>
      </div>
      <div class="pill-icons">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
      </div>
    </div>
  </header>

  <!-- ═══ Expanded: Pixel pet + notifications ═══ -->
  <main class="expanded-content">
    <div class="exp-pet-bar">
      <div class="exp-pet-wrap" id="exp-pet-wrap">
        <div class="pixel-pet octopus" id="exp-pixel-pet"><div class="sprite"></div></div>
      </div>
      <span class="pet-action-icon" id="exp-pet-action"></span>
      <div class="pet-speech" id="pet-speech">Ready to help!</div>
    </div>
    <div class="notification-feed" id="notification-feed"></div>
    <div class="island-footer">
      <span class="footer-stat" id="footer-stat">0 agents</span>
      <span class="footer-link">Show all sessions →</span>
    </div>
  </main>
</div>

<script src="../modules/pet/pet.js"></script>
<script src="../modules/sound/sound.js"></script>
<script src="script.js"></script>
</body>
</html>
